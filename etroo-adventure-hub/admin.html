<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Adventure Editor — Ironside</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<style>
/* ---- admin chrome (loaded only on this protected page) ---- */
.admin-launch{position:fixed;right:16px;bottom:16px;z-index:50;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;border:1px solid var(--gold);background:linear-gradient(180deg,var(--forest-soft),var(--forest));color:var(--mint);padding:12px 18px;border-radius:999px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.5);}
.admin-overlay{position:fixed;inset:0;z-index:60;background:rgba(6,14,9,.55);backdrop-filter:blur(2px);display:none;}
.admin-overlay.open{display:block;}
.admin-drawer{position:fixed;top:0;right:0;height:100%;width:min(540px,100%);z-index:61;transform:translateX(102%);transition:transform .35s ease;background:var(--cream-soft);color:var(--ink);box-shadow:-12px 0 40px rgba(0,0,0,.5);display:flex;flex-direction:column;}
.admin-drawer.open{transform:none;}
.admin-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;background:var(--forest);color:var(--mint);}
.admin-hd h2{font-family:'Cinzel',serif;font-size:16px;margin:0;letter-spacing:.05em;}
.admin-close{background:transparent;border:0;color:var(--mint);font-size:24px;cursor:pointer;line-height:1;}
.admin-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px;background:#ece6d6;border-bottom:1px solid rgba(19,51,47,.15);}
.admin-tab{font-family:'Manrope';font-weight:600;font-size:12px;border:1px solid rgba(19,51,47,.2);background:#fff;color:var(--ink-soft);padding:7px 11px;border-radius:8px;cursor:pointer;}
.admin-tab.active{background:var(--forest);color:var(--mint);border-color:var(--forest);}
.admin-body{flex:1 1 auto;overflow-y:auto;padding:16px 18px 28px;}
.admin-foot{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:#ece6d6;border-top:1px solid rgba(19,51,47,.15);}
.admin-foot .btn{flex:1 1 auto;padding:11px 12px;font-size:12px;}
.fld{margin-bottom:14px;} .fld label{display:block;font-weight:700;font-size:12px;letter-spacing:.04em;color:var(--forest);margin-bottom:5px;text-transform:uppercase;}
.fld input[type=text],.fld input[type=url],.fld input[type=password],.fld input[type=datetime-local],.fld textarea,.fld select{width:100%;padding:9px 11px;border-radius:8px;border:1px solid rgba(19,51,47,.28);background:#fff;color:var(--ink);font:inherit;font-size:14px;}
.fld textarea{min-height:70px;resize:vertical;line-height:1.5;}
.fld .hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
.fld-row{display:flex;gap:10px;flex-wrap:wrap;} .fld-row>.fld{flex:1 1 140px;}
.swatch{display:flex;align-items:center;gap:8px;} .swatch input[type=color]{width:42px;height:34px;border:1px solid rgba(19,51,47,.3);border-radius:8px;background:#fff;padding:2px;cursor:pointer;} .swatch input[type=text]{flex:1;}
.img-field{display:flex;gap:8px;align-items:center;} .img-field input{flex:1;} .img-thumb{width:40px;height:40px;border-radius:8px;border:1px solid rgba(19,51,47,.25);object-fit:cover;background:#fff;}
.toggles{display:flex;flex-wrap:wrap;gap:8px 14px;} .toggle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-soft);} .toggle input{width:16px;height:16px;}
.ed-card{border:1px solid rgba(19,51,47,.2);border-radius:12px;padding:14px;margin-bottom:14px;background:#fff;}
.ed-card>summary{cursor:pointer;font-family:'Cinzel',serif;font-weight:600;color:var(--forest);list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ed-card>summary::-webkit-details-marker{display:none;}
.ed-tools{display:flex;gap:6px;} .ed-tools button{border:1px solid rgba(19,51,47,.25);background:#f4f1e8;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--ink);}
.ed-inner{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(19,51,47,.2);}
.pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:999px;margin-left:8px;}
.pill.live{background:#1f6b3c;color:#fff;} .pill.sched{background:#2b4a6f;color:#fff;} .pill.off{background:#8f886f;color:#fff;}
.add-btn{width:100%;border:1px dashed var(--gold);background:rgba(201,162,74,.08);color:var(--forest);font-weight:700;padding:11px;border-radius:10px;cursor:pointer;font-family:'Cinzel',serif;}
.admin-note{font-size:12px;background:#fff;border:1px solid rgba(19,51,47,.18);border-radius:10px;padding:11px 13px;margin-bottom:14px;color:var(--ink-soft);}
.man-when,.sched-when{display:none;} .man-when.show,.sched-when.show{display:block;}
/* login */
.login-wrap{position:fixed;inset:0;z-index:70;display:grid;place-items:center;padding:20px;}
.login-card{width:min(380px,100%);text-align:center;padding:30px 26px;}
.login-card h1{font-family:'Cinzel',serif;color:var(--forest);font-size:22px;margin:0 0 6px;}
.login-card p{color:var(--ink-soft);font-size:14px;margin:0 0 18px;}
.login-card input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(19,51,47,.3);font:inherit;margin-bottom:12px;}
.login-err{color:#b5482e;font-size:13px;min-height:1.2em;margin-bottom:6px;}
.editing-banner{position:fixed;top:0;left:0;right:0;z-index:40;background:var(--gold);color:var(--bg-dark);text-align:center;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;padding:6px;text-transform:uppercase;}
body.is-editing .wrap{padding-top:34px;}
#admin-flash{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:80;background:#163a24;color:#cfe7d5;padding:10px 18px;border-radius:999px;border:1px solid #c9a24a;font-family:Cinzel,serif;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .4s;pointer-events:none;}
</style>
</head>
<body>
<div class="atmos" id="atmos" aria-hidden="true"></div>
<main class="wrap" id="app" aria-live="polite"></main>
<footer><div class="crest">Ironside Computers</div><div>Editor mode</div></footer>
<script src="/assets/engine.js"></script>
<script src="/assets/admin.js"></script>
</body>
</html>
