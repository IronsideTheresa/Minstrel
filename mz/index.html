<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Legend of Etroo — An Ironside Adventure</title>
<meta name="description" content="A living digital storybook from Ironside Computers." />
<meta property="og:title" content="The Legend of Etroo — An Ironside Adventure" />
<meta property="og:description" content="A forgotten spirit. A dying forest. A journey to restore what was lost." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<!-- GA4 / GTM: paste your snippet here. Minstrel pushes events to window.dataLayer
     and calls gtag() automatically — no other wiring needed. -->
</head>
<body>
<div class="atmos" id="atmos" aria-hidden="true"></div>
<main class="wrap" id="app" aria-live="polite">
  <p style="text-align:center;padding:80px 0;color:var(--mint-dim);font-family:'Cormorant Garamond',serif;font-style:italic;">Opening the storybook…</p>
</main>
<footer>
  <div class="crest">Ironside Computers</div>
  <div>Handcrafted adventures for the curious. New chapters every week.</div>
</footer>
<script src="/assets/engine.js"></script>
<script>
(async function(){
  let site=null;
  try{ const r=await fetch('/api/content',{cache:'no-store'}); if(r.ok) site=await r.json(); }catch(e){}
  if(!site){ // local review fallback: show the locally published preview, else starter content
    try{ const ls=localStorage.getItem('minstrel_published'); if(ls) site=JSON.parse(ls); }catch(e){}
    if(!site){ try{ site=await (await fetch('content.default.json')).json(); }catch(_){ document.getElementById('app').innerHTML='<p style="text-align:center;padding:80px;color:var(--mint)">The story could not be loaded.</p>'; return; } }
  }
  Minstrel.publicRender(site,'#app');
  setInterval(()=>Minstrel.tickCountdowns(), 30000);
})();
</script>
</body>
</html>
